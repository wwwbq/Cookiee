vlm:
  vision_model:
    type: clip
    weight: XXX/clip-vit-large-patch14-336
  image_processor:
    type: llava
    do_pad: true
  text_model: Qwen/Qwen2.5-7B
  image_token: <|image_pad|>

dataset: VLM-150M-subset1M-long-caption
max_seq_length: 2048
preprocessing_num_workers: 128
preprocessing_batch_size: 1024
overwrite_cache: true

task: pretrain
num_train_epochs: 1
#max_steps: 128000  
per_device_train_batch_size: 32 #24
gradient_accumulation_steps: 1
warmup_ratio: 0.02
#warmup_steps: 60
lr_scheduler_type: cosine #constant cosine constant_with_warmup
logging_steps: 10
learning_rate: 1.0e-3
bf16: true
deepspeed: configs/deepspeed/ds_z2_config.json
gradient_checkpointing: true

seed: 3407
save_steps: 2000
output_dir: saves/XXX
save_total_limit: 5
report_to: none #swanlab
log_level: info